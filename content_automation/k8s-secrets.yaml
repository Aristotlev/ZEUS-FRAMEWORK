# Create Kubernetes secrets (run once)
apiVersion: v1
kind: Secret
metadata:
  name: zeus-secrets
  namespace: zeus-framework
type: Opaque
data:
  # Base64 encoded values (replace with your actual encoded keys)
  openrouter-api-key: <base64_encoded_openrouter_key>
  db-password: <base64_encoded_db_password>
  fal-api-key: <base64_encoded_fal_key>
  elevenlabs-api-key: <base64_encoded_elevenlabs_key>
  publer-api-key: <base64_encoded_publer_key>
  heygen-api-key: <base64_encoded_heygen_key>

---
# Example: How to encode secrets
# echo -n "your-openrouter-key" | base64
# echo -n "your-db-password" | base64