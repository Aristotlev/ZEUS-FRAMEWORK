version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: zeus_content
      POSTGRES_USER: zeus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching/sessions
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Zeus Framework Main Application
  zeus-app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # OpenRouter (already have key)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: zeus
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: zeus_content
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Media APIs (to be added later)
      FAL_API_KEY: ${FAL_API_KEY:-placeholder}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-placeholder}
      PUBLER_API_KEY: ${PUBLER_API_KEY:-placeholder}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY:-placeholder}
      
      # Publer Account IDs (to be configured)
      TWITTER_ACCOUNT_ID: ${TWITTER_ACCOUNT_ID:-placeholder}
      INSTAGRAM_ACCOUNT_ID: ${INSTAGRAM_ACCOUNT_ID:-placeholder}
      TIKTOK_ACCOUNT_ID: ${TIKTOK_ACCOUNT_ID:-placeholder}
      YOUTUBE_ACCOUNT_ID: ${YOUTUBE_ACCOUNT_ID:-placeholder}
      LINKEDIN_ACCOUNT_ID: ${LINKEDIN_ACCOUNT_ID:-placeholder}
      
      # Budget limits
      DAILY_BUDGET_LIMIT: 50.0
      
    volumes:
      - ./logs:/app/logs
      - ./media_cache:/app/media_cache
      - ./backups:/app/backups
      - ./content_ideas:/app/content_ideas  # Content Ideas Intelligence
    restart: unless-stopped

  # Monitoring Dashboard
  zeus-monitor:
    build: .
    command: python monitor.py
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: zeus
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: zeus_content
    ports:
      - "8080:8080"
    restart: unless-stopped

  # Nginx Load Balancer (for scaling)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl  # SSL certificates
    depends_on:
      - zeus-app
      - zeus-monitor
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: