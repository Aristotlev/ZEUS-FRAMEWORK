# Zeus Framework - Kubernetes Deployment
apiVersion: v1
kind: Namespace
metadata:
  name: zeus-framework

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: zeus-framework
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: "zeus_content"
        - name: POSTGRES_USER
          value: "zeus"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zeus-secrets
              key: db-password
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: zeus-framework
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--appendonly", "yes"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# Zeus App Deployment (Scalable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeus-app
  namespace: zeus-framework
spec:
  replicas: 3  # Start with 3 replicas
  selector:
    matchLabels:
      app: zeus-app
  template:
    metadata:
      labels:
        app: zeus-app
    spec:
      containers:
      - name: zeus-app
        image: zeus-framework:latest
        env:
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: zeus-secrets
              key: openrouter-api-key
        - name: DB_HOST
          value: "postgres"
        - name: DB_USER
          value: "zeus"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zeus-secrets
              key: db-password
        - name: REDIS_URL
          value: "redis://redis:6379"
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "800m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Zeus Monitor Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeus-monitor
  namespace: zeus-framework
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeus-monitor
  template:
    metadata:
      labels:
        app: zeus-monitor
    spec:
      containers:
      - name: zeus-monitor
        image: zeus-framework:latest
        command: ["python", "monitor.py"]
        env:
        - name: DB_HOST
          value: "postgres"
        - name: DB_USER
          value: "zeus"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zeus-secrets
              key: db-password
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"

---
# Services
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: zeus-framework
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: zeus-framework
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: zeus-app
  namespace: zeus-framework
spec:
  selector:
    app: zeus-app
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: zeus-monitor
  namespace: zeus-framework
spec:
  selector:
    app: zeus-monitor
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zeus-ingress
  namespace: zeus-framework
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # If using cert-manager
spec:
  rules:
  - host: zeus.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: zeus-app
            port:
              number: 8000
      - path: /monitor
        pathType: Prefix
        backend:
          service:
            name: zeus-monitor
            port:
              number: 8080
  tls:
  - hosts:
    - zeus.yourdomain.com
    secretName: zeus-tls

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zeus-app-hpa
  namespace: zeus-framework
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zeus-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80