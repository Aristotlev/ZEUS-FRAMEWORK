<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Zeus Framework">
  <title>Zeus Framework — local-first AI agent framework</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="55%" stop-color="#11172a"/>
      <stop offset="100%" stop-color="#1a223d"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- subtle constellation dots -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="120" cy="80"  r="1.5"/>
    <circle cx="260" cy="40"  r="1"/>
    <circle cx="380" cy="120" r="1.2"/>
    <circle cx="540" cy="60"  r="1"/>
    <circle cx="700" cy="100" r="1.3"/>
    <circle cx="860" cy="50"  r="1"/>
    <circle cx="1020" cy="90" r="1.5"/>
    <circle cx="1160" cy="70" r="1.1"/>
    <circle cx="180" cy="240" r="1.2"/>
    <circle cx="420" cy="270" r="1"/>
    <circle cx="660" cy="250" r="1.3"/>
    <circle cx="900" cy="270" r="1"/>
    <circle cx="1100" cy="240" r="1.2"/>
  </g>

  <!-- lightning bolt (glow) -->
  <g transform="translate(150 60)">
    <path d="M110 0 L20 160 L80 160 L40 280 L160 100 L100 100 Z"
          fill="url(#bolt)" filter="url(#glow)" opacity="0.55"/>
    <path d="M110 0 L20 160 L80 160 L40 280 L160 100 L100 100 Z"
          fill="url(#bolt)"/>
  </g>

  <!-- wordmark -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="url(#title)">
    <text x="380" y="155" font-size="92" font-weight="700" letter-spacing="6">ZEUS</text>
    <text x="380" y="220" font-size="48" font-weight="400" letter-spacing="14" fill="#94a3b8">FRAMEWORK</text>
  </g>

  <!-- tagline -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">
    <text x="380" y="265" font-size="18" letter-spacing="1.5">local-first · memory-persistent · self-evolving</text>
  </g>
</svg>
