# ============================================================================
# Zeus Framework — Production overrides
# ============================================================================
# Use with the base file:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
#
# Differences vs the base file:
#   - Replaces the agent entrypoint with one that bootstraps + heartbeats
#     (no interactive Hermes REPL; container stays alive for `docker exec`)
#   - Adds healthchecks + resource limits + always-restart on the agent
#   - Postgres tuned down for a 4 GB box
#   - Adds Caddy (auto-TLS reverse proxy) + status (FastAPI dashboard)
# The repo's bind mounts (skills, plugins/mnemosyne, soul/SOUL.md) are kept —
# they let you `git pull` on the box and have skills update without a rebuild.
# ============================================================================

services:

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=8MB
      - -c
      - max_connections=20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  zeus:
    restart: unless-stopped
    stdin_open: false
    tty: false
    # `docker restart` (auto-deploy on every push to main) sends SIGTERM
    # with a 10s grace by default, then SIGKILL. That window is too short:
    # an article-slot cron run takes 2-5min, and a SIGKILL mid-flight
    # leaves orphaned Publer schedules + half-archived Notion rows that
    # the watcher then has to reconcile. 5min covers every pipeline type
    # we currently run (long_article ≤4min, breaking_news ≤90s, carousel
    # ≤3min); deploys still complete in <6min end-to-end.
    stop_grace_period: 300s
    # Load all secrets from .env.prod directly into the container env. The
    # `--env-file` compose flag only fuels ${VAR} substitution; without this
    # env_file directive only OPENROUTER_API_KEY (the one explicitly listed
    # in the base compose file) reaches the agent. We need FAL_KEY,
    # NOTION_API_KEY, PUBLER_*, HCLOUD_TOKEN, etc. to flow through too.
    env_file:
      - ./deploy/.env.prod
    # Bootstrap data volume (same as zeus-entrypoint.sh) then run a
    # heartbeat loop instead of an interactive Hermes REPL. Cron jobs
    # are registered via `docker exec zeus-agent setup_content_cron.py`
    # after first boot — see deploy/README.md.
    entrypoint: ["/usr/local/bin/zeus-prod-entrypoint.sh"]
    volumes:
      - zeus-hermes-data:/opt/data
      - ./deploy/zeus-prod-entrypoint.sh:/usr/local/bin/zeus-prod-entrypoint.sh:ro
      # The base Dockerfile only ships skills/, plugins/, memory/, stack/,
      # SOUL.md. Bind-mount scripts/ and core/ so setup_content_cron.py and
      # the cron module are visible inside the container — and so `git pull`
      # on the host updates them without an image rebuild.
      - ./scripts:/opt/zeus/scripts:ro
      - ./core:/opt/zeus/core:ro
      # Manual-drop inbox for the EVENT_CLIP pipeline. SCP videos here:
      #   scp clip.mp4 root@<vm>:/opt/zeus/event_clip_inbox/
      # The next hourly EVENT_CLIP cron tick picks it up, Gemini chooses
      # the ≤90s window, Publer + Substack fan-out runs as normal.
      # See lib/event_clip_sources/manual.py for the source impl.
      - ./event_clip_inbox:/opt/zeus/event_clip_inbox:ro
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "test -f /opt/data/.heartbeat && find /opt/data/.heartbeat -mmin -30 | grep -q ."]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 2m
    environment:
      ZEUS_DOMAIN: ${ZEUS_DOMAIN}
      ZEUS_TRIGGER_TOKEN: ${ZEUS_TRIGGER_TOKEN}
      # Service discovery for the browser-fetch sidecar. The lib client
      # defaults to this URL even when the env var is unset, but making
      # it explicit means `docker exec zeus-agent env` reflects reality.
      ZEUS_BROWSER_FETCH_URL: http://browser-fetch:8000
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── browser-fetch — headless Chromium sidecar for CDN-walled sources ─────────
  # cspan (Cloudflare 202 challenge + SPA), imf (listing CDN), senate_banking
  # (Akamai) all 403 plain HTTP from the Hetzner IP. This service renders pages
  # in a real Chromium and exposes POST /fetch + POST /fetch-binary on the
  # zeus-net bridge. Internal-only, no public port. See deploy/browser-fetch/.
  browser-fetch:
    build:
      context: ./deploy/browser-fetch
      dockerfile: Dockerfile
    image: zeus-browser-fetch:latest
    container_name: zeus-browser-fetch
    restart: unless-stopped
    networks:
      - zeus-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8000/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          # Chromium is memory-hungry. 1.5 GB covers a single context with
          # SPA-heavy pages (cspan, banking.senate.gov). One context at a
          # time is serialized inside server.py.
          memory: 1536M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Caddy — auto-TLS reverse proxy ───────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: zeus-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - zeus-caddy-data:/data
      - zeus-caddy-config:/config
    environment:
      ZEUS_DOMAIN: ${ZEUS_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - status
    networks:
      - zeus-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Status — FastAPI dashboard / webhooks / remote trigger ───────────────────
  status:
    build:
      context: ./deploy/status
      dockerfile: Dockerfile
    image: zeus-status:latest
    container_name: zeus-status
    restart: unless-stopped
    environment:
      ZEUS_TRIGGER_TOKEN: ${ZEUS_TRIGGER_TOKEN}
      HERMES_HOME: /opt/data
    volumes:
      # Shared with the agent — reads ledger/queue/heartbeat, writes webhook logs
      - zeus-hermes-data:/opt/data
      # Docker socket so /trigger can exec into the zeus container
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - zeus-net
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  zeus-caddy-data:
  zeus-caddy-config:
